<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg-deep:#111110;
  --bg-card:rgba(255,255,255,.04);
  --teal:#0B7A62;
  --teal-deep:#055843;
  --teal-bright:#1AAA89;
  --teal-glow:rgba(26,170,137,.12);
  --text-primary:oklch(.92 .01 160);
  --text-secondary:oklch(.72 .01 160);
  --text-muted:oklch(.52 .01 160);
  --border:rgba(255,255,255,.08);
  --border-hover:rgba(255,255,255,.14);
  --sans:'Inter','SF Pro Text',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono','SF Mono',Menlo,monospace;
  --ease-out:cubic-bezier(.16,1,.3,1);
}

html{height:100%}
body{
  min-height:100svh;
  background:var(--bg-deep);
  color:var(--text-primary);
  font-family:var(--sans);
  display:grid;
  grid-template-rows:1fr auto;
  place-items:center;
  padding:24px;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
  position:relative;
}

/* ambient wash */
body::before{
  content:"";position:fixed;top:-40%;left:50%;transform:translateX(-50%);
  width:160vw;height:100vh;
  background:radial-gradient(ellipse at center,rgba(26,170,137,.06) 0%,transparent 55%);
  pointer-events:none;z-index:0;
}

/* ── orb ── */
.orb-wrap{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-54%);
  pointer-events:none;z-index:0;
}

.orb{
  width:clamp(230px,38vw,380px);
  height:clamp(230px,38vw,380px);
  border-radius:50%;
  background:
    radial-gradient(circle at 35% 28%,var(--teal-bright) 0%,var(--teal) 30%,var(--teal-deep) 65%,rgba(5,88,67,.2) 100%);
  box-shadow:
    inset 0 0 50px rgba(26,170,137,.25),
    0 0 80px 30px rgba(11,122,98,.06),
    0 0 160px 60px rgba(11,122,98,.03);
  position:relative;
  animation:orb-breathe 6s var(--ease-out) infinite alternate;
}

.orb::before{
  content:"";position:absolute;
  top:14%;left:22%;width:45%;height:40%;
  border-radius:50%;
  background:radial-gradient(ellipse at center,rgba(255,255,255,.45) 0%,rgba(255,255,255,.08) 50%,transparent 70%);
  filter:blur(8px);
}

.orb::after{
  content:"";position:absolute;inset:-2px;border-radius:50%;
  border:1px solid rgba(255,255,255,.06);
}

@keyframes orb-breathe{
  0%{transform:scale(1);filter:brightness(1)}
  100%{transform:scale(1.04);filter:brightness(1.08)}
}

/* concentric rings */
.ring{
  position:absolute;border-radius:50%;
  border:1px solid rgba(26,170,137,.06);
  top:50%;left:50%;
  animation:ring-expand 8s linear infinite;
  pointer-events:none;
}
.ring:nth-child(2){animation-delay:-2s}
.ring:nth-child(3){animation-delay:-4s}
.ring:nth-child(4){animation-delay:-6s}

@keyframes ring-expand{
  0%{width:100%;height:100%;transform:translate(-50%,-50%);opacity:.6}
  100%{width:280%;height:280%;transform:translate(-50%,-50%);opacity:0}
}

/* ── card ── */
.card{
  position:relative;z-index:2;
  width:min(92vw,520px);
  background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.02));
  border:1px solid var(--border);
  border-radius:28px;
  padding:clamp(36px,6vw,56px) clamp(32px,5vw,48px);
  backdrop-filter:blur(24px) saturate(130%);
  -webkit-backdrop-filter:blur(24px) saturate(130%);
  opacity:0;transform:translateY(20px);
  animation:card-enter 1s var(--ease-out) .2s forwards;
}

.card::before{
  content:"";position:absolute;inset:-1px;border-radius:28px;
  background:radial-gradient(70% 50% at 50% 0%,rgba(26,170,137,.15),transparent 55%);
  pointer-events:none;
}

@keyframes card-enter{to{opacity:1;transform:none}}

/* brand bar */
.brand{
  display:flex;align-items:center;gap:10px;
  margin-bottom:28px;
}
.brand-mark{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 35% 30%,var(--teal-bright) 0%,var(--teal) 35%,var(--teal-deep) 100%);
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.08),0 0 12px rgba(11,122,98,.25);
  position:relative;
}
.brand-mark::after{
  content:"";position:absolute;inset:7px;border-radius:50%;
  background:rgba(255,255,255,.5);filter:blur(2px);
}
.brand-label{
  font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--text-muted);
}

/* type */
.card h1{
  font-weight:700;
  font-size:clamp(2rem, 5vw + 1rem, 3.2rem);
  line-height:1.15;letter-spacing:-0.03em;
  background:linear-gradient(180deg,oklch(.95 .005 240),oklch(.72 .01 240),oklch(.88 .005 240));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  text-wrap:balance;
}

.card h1 span{
  background:linear-gradient(180deg,oklch(.95 .005 240),oklch(.72 .01 240),oklch(.88 .005 240));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}

.subtitle{
  margin-top:14px;
  font-size:clamp(15px,1.2vw,17px);
  font-weight:400;
  line-height:1.65;color:oklch(.82 .01 160);
  max-width:38ch;
}

/* divider + cta */
.cta-area{
  margin-top:32px;padding-top:28px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;gap:16px;
}

.cta-orb{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 35% 30%,var(--teal-bright),var(--teal) 50%,var(--teal-deep) 100%);
  box-shadow:0 0 0 0 rgba(26,170,137,.4);
  display:flex;align-items:center;justify-content:center;
  animation:cta-pulse 2.8s var(--ease-out) infinite;
  position:relative;
}
.cta-orb::after{
  content:"";position:absolute;inset:10px;border-radius:50%;
  background:rgba(255,255,255,.4);filter:blur(3px);
}
.cta-orb svg{width:20px;height:20px;stroke:rgba(255,255,255,.95);position:relative;z-index:1}

@keyframes cta-pulse{
  0%{box-shadow:0 0 0 0 rgba(26,170,137,.4)}
  70%{box-shadow:0 0 0 16px rgba(26,170,137,0)}
  100%{box-shadow:0 0 0 0 rgba(26,170,137,0)}
}

.cta-text{
  font-size:14px;line-height:1.55;color:var(--text-secondary);
}
.cta-text strong{
  display:block;font-weight:600;color:oklch(.96 .01 160);margin-bottom:2px;
}

/* footer */
.foot{
  position:relative;z-index:2;
  padding-bottom:8px;
  text-align:center;
  font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
}
.foot a{color:var(--text-muted);text-decoration:none;transition:color .3s var(--ease-out)}
.foot a:hover{color:var(--text-secondary)}

/* reduced motion */
@media(prefers-reduced-motion:reduce){
  .card{opacity:1;transform:none;animation:none}
  .orb{animation:none}
  .cta-orb{animation:none}
  .ring{animation:none;display:none}
}
</style>
</head>
